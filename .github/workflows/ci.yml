name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # Windows is in the matrix because the framework cfg-gates Unix-only
        # code (Ctrl-Z suspend); this catches breakage on both sides.
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --all-targets

      - name: Test
        run: cargo test --all-targets

      - name: Doc tests
        run: cargo test --doc

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Docs
        run: cargo doc --no-deps

      - name: Shellcheck setup script
        if: runner.os == 'Linux'
        run: shellcheck setup.sh

  msrv:
    name: MSRV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Read the MSRV from Cargo.toml so it can never drift from CI.
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: echo "msrv=$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)" >> "$GITHUB_OUTPUT"

      - name: Install Rust ${{ steps.msrv.outputs.msrv }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --all-targets

  setup-script:
    name: Setup script (${{ matrix.mode.name }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # macOS ships BSD userland (sed/awk/find), so running the matrix there
        # catches GNU-only shell constructs before users on Macs do.
        os: [ubuntu-latest, macos-latest]
        mode:
          - name: rename
            flags: ""
          - name: app-only
            flags: "--app-only"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run setup.sh
        run: ./setup.sh my-test-app ${{ matrix.mode.flags }} --yes

      - name: Lint result
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings

      - name: Test result
        run: cargo test --all-targets
